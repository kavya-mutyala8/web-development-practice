<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile Settings</title>
</head>
<body>
    <div class="wrapper">
        <aside class="settings-sidebar">
            <div class="user-pill">
                <div class="avatar-placeholder">S</div>
                <div class="User-pill-info">
                    <h3>Swathi M</h3>
                    <p>Pro Member</p>
                </div>
            </div>

            <nav class="sidebar-menu">
                <a href="#profile">Profile</a>
                <a href="#account">Account</a>
                <a href="#notifications">Notifications</a>
                <a href="#privacy">Privacy</a>
                <a href="#security">Security</a>
                <a href="#Logout">Logout</a>
            </nav>
        </aside>

        <main class="Settinga-main">
            <h2>Account Settings</h2>
            <p class="account-settings-description">Manage your account settings and set e-mail preferences.</p>

            <form class="account-settings-form">
                <div class="profile-pic-selection">
                    <div class="avatar-placeholder">S</div>
                    <div class="pic-button">
                        <button type="button" class="change-pic-button">Change Photo</button>
                        <button type="button" class="remove-pic-button">Remove</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" value="SwathiM">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" value="swathim@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" value="********">
                </div>

                <div class="form-group">
                    <label for="notifications">Email Notifications</label>
                    <select id="notifications" name="notifications">
                        <option value="all">All Notifications</option>
                        <option value="important">Important Only</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <button type="submit" class="save-button">Save Changes</button>
            </form>
        </main>
    </div>
    
</body>
</html>
